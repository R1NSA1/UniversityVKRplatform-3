services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vkr_main}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - default

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - topic-service
      - email-service
      - admin-service
    networks:
      - default

  auth-service:
    build:
      context: ../auth-service
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vkr_main}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - EMAIL_SERVICE_URL=http://email-service:8000
      - SHOW_LOGIN_CODE=${SHOW_LOGIN_CODE:-true}
      - LOG_LOGIN_CODE=${LOG_LOGIN_CODE:-true}
      - LOGIN_CODE_EMAIL_SUBJECT=${LOGIN_CODE_EMAIL_SUBJECT:-Код входа в платформу ВКР}
      - SEND_EMAIL_CODES=${SEND_EMAIL_CODES:-false}
    env_file:
      - .env
    volumes:
      - ../shared:/app/shared:ro
    depends_on:
      postgres:
        condition: service_healthy
      email-service:
        condition: service_started
    networks:
      - default

  topic-service:
    build:
      context: ../topic-service
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vkr_main}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - EMAIL_SERVICE_URL=http://email-service:8000
      - SEND_EMAIL_CODES=${SEND_EMAIL_CODES:-false}
    volumes:
      - ../shared:/app/shared:ro
    depends_on:
      postgres:
        condition: service_healthy
      email-service:
        condition: service_started
    networks:
      - default

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - default

  email-service:
    build: ../email-service
    restart: always
    ports:
      - "8003:8000"
    environment:
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-true}
      - SMTP_USE_STARTTLS=${SMTP_USE_STARTTLS:-false}
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - default

  admin-service:
    build: ../admin-service
    restart: always
    ports:
      - "8004:8000"
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - default

volumes:
  pgdata:
  pgadmin-data:

networks:
  default:
    driver: bridge